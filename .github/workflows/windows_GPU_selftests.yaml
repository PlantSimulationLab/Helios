name: Build and Run on Windows EC2 GPU Instance

on:
  push:
    branches: [ "master" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

permissions:
  id-token: write
  contents: read

# Serialize runs of this workflow so concurrent runs do not race on the single shared
# EC2 GPU instance. Previously, one run could try to start the instance while another
# run's stop-gpu job was stopping it, leaving the instance in a transitional state that
# broke start-gpu. New runs queue behind in-progress ones (rather than cancelling them),
# so the instance is always fully released before the next run touches it.
concurrency:
  group: windows-gpu-ec2-instance
  cancel-in-progress: false

jobs:

  start-gpu:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: us-west-2
      - run: |
          set -uo pipefail
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID_WIN }}"

          # Drive the shared GPU instance to a 'running' state, tolerating transitional
          # states and races with other runs. The previous implementation exited 1 whenever
          # the instance was momentarily in 'stopping'/'pending', which made start-gpu fail
          # before the build job ever ran. Here we keep polling until the instance is either
          # 'running' or settles into 'stopped' (which we then start), bounded by a deadline.
          deadline=$(( SECONDS + 600 ))   # up to 10 minutes
          while true; do
            STATE=$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
              --query "Reservations[0].Instances[0].State.Name" --output text 2>/dev/null || echo "unknown")
            echo "Current instance state: $STATE"
            case "$STATE" in
              running)
                echo "Instance is running."
                break
                ;;
              stopped)
                echo "Instance is stopped; issuing start-instances..."
                # Tolerate a concurrent run that may have already started it.
                aws ec2 start-instances --instance-ids "$INSTANCE_ID" >/dev/null \
                  || echo "start-instances returned non-zero (likely a concurrent start); will keep polling."
                ;;
              pending|stopping)
                echo "Instance is transitioning ('$STATE'); waiting for it to settle..."
                ;;
              shutting-down|terminated)
                echo "Instance is '$STATE' and cannot be started." >&2
                exit 1
                ;;
              *)
                echo "Unexpected/empty instance state ('$STATE'); waiting and retrying..."
                ;;
            esac
            if (( SECONDS >= deadline )); then
              echo "Timed out waiting for instance to reach 'running' state." >&2
              exit 1
            fi
            sleep 10
          done

          # Belt-and-suspenders: confirm AWS also reports the instance as running before
          # handing off to the self-hosted runner job.
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          echo "Instance is running and ready."

  run_samples_windows:
    runs-on: [self-hosted, Windows]
    needs: start-gpu
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Bash script
        shell: bash
        run: |
          cd utilities
          if ! ./run_tests.sh --visbuildonly --log-file ../windows_GPU_selftests.log; then
            echo "==== run_tests.sh failed; dumping windows_GPU_selftests.log ===="
            cat ../windows_GPU_selftests.log
            exit 1
          fi


  stop-gpu:
    needs: run_samples_windows
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: us-west-2
      - run: |
          aws ec2 stop-instances --instance-ids ${{ secrets.EC2_INSTANCE_ID_WIN }}
          aws ec2 wait instance-stopped --instance-ids ${{ secrets.EC2_INSTANCE_ID_WIN }}
